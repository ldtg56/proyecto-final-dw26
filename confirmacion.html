<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/carrito.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link rel="icon" href="img/logoD'Mela.jpg">
    <title>Confirmación - D'Mela</title>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <header class="py-3 px-3 px-md-4 px-lg-5 shadow-sm header-progreso"
        style="background-color: #8C1616; border-bottom: 4px solid #A65353;">
        <div class="container-fluid d-flex flex-column flex-lg-row align-items-center justify-content-between gap-3">

            <div class="logo-container text-center text-lg-start">
                <a href="index.html">
                    <img src="img/logoD'Mela - copia.jpg" alt="D'Mela Dulcería & Cafetería" class="img-fluid logo-pasos"
                        style="max-height: 100px; object-fit: contain;">
                </a>
            </div>

            <nav class="d-none d-sm-flex align-items-center justify-content-between w-100 text-nowrap user-select-none nav-pasos"
                style="color: #F2F2F2; max-width: 650px;">

                <div class="d-flex align-items-center gap-1 gap-sm-2 fw-normal opacity-75 paso-animado paso-1">
                    <span class="rounded-circle d-flex align-items-center justify-content-center m-0 circulo-inactivo"
                        style="width: 32px; height: 32px; background-color: transparent; color: #F2F2F2; border: 2px solid #F2F2F2; font-size: 0.95rem;">
                        1
                    </span>
                    <span style="font-size: 0.95rem;">Carrito</span>
                </div>

                <!-- Línea 1 -->
                <div class="flex-grow-1 my-auto mx-2 mx-md-3 opacity-75 linea-progreso linea-1"
                    style="height: 2px; min-width: 20px; background-color: #F2F2F2;"></div>

                <div class="d-flex align-items-center gap-1 gap-sm-2 fw-normal opacity-75 paso-animado paso-2">
                    <span class="rounded-circle d-flex align-items-center justify-content-center m-0 circulo-inactivo"
                        style="width: 32px; height: 32px; background-color: transparent; color: #F2F2F2; border: 2px solid #F2F2F2; font-size: 0.95rem;">
                        2
                    </span>
                    <span style="font-size: 0.95rem;">Pago</span>
                </div>

                <div class="flex-grow-1 my-auto mx-2 mx-md-3 opacity-75 linea-progreso linea-2"
                    style="height: 2px; min-width: 20px; background-color: #F2F2F2;"></div>

                <div class="d-flex align-items-center gap-1 gap-sm-2 fw-bold paso-animado paso-3">
                    <span
                        class="rounded-circle d-flex align-items-center justify-content-center m-0 shadow-sm circulo-activo">
                        3
                    </span>
                    <span style="font-size: 0.95rem;">Confirmación</span>
                </div>

            </nav>

        </div>
    </header>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="container text-center px-3" style="max-width: 500px;">

            <div class="mb-4">
                <i class="fa-regular fa-circle-check" style="font-size: 7rem; color: #1a1a1a;"></i>
            </div>

            <h2 class="fw-bold mb-4" style="color: #333; font-size: 1.8rem;" id="tituloGracias">¡Gracias por tu compra!
            </h2>

            <div class="py-2 px-4 mb-4 mx-auto text-dark fw-semibold shadow-sm"
                style="background-color: #BF8484; border-radius: 2px; max-width: 250px; font-size: 1.05rem;"
                id="numeroOrden">
                Orden #---
            </div>

            <div class="text-start mx-auto text-muted mb-5 bg-white p-4 rounded shadow-sm"
                style="max-width: 380px; font-size: 0.95rem;">
                <p class="mb-3 text-center fw-bold">Resumen del pedido:</p>

                <div id="listaConfirmacion">
                </div>

                <div class="d-flex justify-content-between pt-3 mt-3 border-top border-secondary border-opacity-25 fw-bold text-danger d-none"
                    id="filaDescuentoConfirmacion" style="font-size: 1rem;">
                    <span>Descuento aplicado:</span>
                    <span id="descuentoAplicadoConfirmacion">- S/ 0.00</span>
                </div>

                <div class="d-flex justify-content-between border-top border-secondary border-opacity-25 pt-2 mt-2 fw-bold text-dark"
                    style="font-size: 1.1rem;">
                    <span>Total Pagado:</span>
                    <span id="totalPagadoConfirmacion">S/ 0.00</span>
                </div>

                <div class="d-flex justify-content-between pt-2 fw-bold text-success" style="font-size: 0.95rem;">
                    <span><i class="fa-solid fa-gift me-1"></i> Puntos ganados:</span>
                    <span id="puntosGanadosConfirmacion">+ 0 pts</span>
                </div>
            </div>

            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 gap-sm-4 mt-2">
                <a href="index.html" class="btn text-white fw-semibold px-4 py-2 shadow-sm"
                    style="background-color: #8C1616; border-radius: 4px;">Volver al Inicio</a>
                <a href="producto.html" class="btn text-white fw-semibold px-4 py-2 shadow-sm"
                    style="background-color: #8C1616; border-radius: 4px;">Seguir Comprando</a>
            </div>
        </div>
    </main>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/confirmacion.js"></script>
    <script src="js/sesion.js"></script>
</body>

</html>
